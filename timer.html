<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phil's Log v1.5</title>
    <style>
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.4rem; margin: 5px 0; border-bottom: 2px solid #000; width: 100%; text-align: center; }
        
        .section-label { width: 100%; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #666; margin: 10px 0 5px 5px; }
        
        .timer-card { width: 98%; max-width: 600px; border: 2px solid #000; border-radius: 10px; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .engine-bg { background: #fff; }
        .flight-bg { background: #e6f3ff; border-color: #007bff; }

        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .display { font-family: monospace; font-size: 1.6rem; font-weight: bold; }
        
        .stats-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 5px; border-top: 1px solid #ccc; padding-top: 8px; font-size: 0.85rem; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-family: monospace; font-size: 1.1rem; font-weight: bold; }

        button { padding: 12px; font-size: 0.9rem; font-weight: bold; border-radius: 6px; border: 2px solid #000; cursor: pointer; }
        .btn-start { background: #00ff00; width: 80px; }
        .btn-stop { background: #ff0000; color: #fff; width: 80px; }
        
        .mullah-box { width: 98%; max-width: 600px; padding: 8px; background: #e9f7ef; border: 1px solid #28a745; border-radius: 8px; font-size: 0.75rem; margin-bottom: 10px; }
        .mullah-table { width: 100%; border-collapse: collapse; text-align: center; }

        .action-btn { width: 98%; max-width: 600px; margin-top: 8px; padding: 15px; color: #fff; }
        
        /* Logbook Overlay */
        #history-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        .log-table th, .log-table td { border: 1px solid #000; padding: 5px; text-align: center; }
        .sep { background: #eee; font-weight: bold; }
        
        .delete-btn { background: #ff4444; color: white; width: 100%; margin-top: 30px; border: 2px solid #cc0000; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1>Phils Timer Log</h1>

        <div class="section-label">Engine Management</div>
        <div class="timer-card engine-bg">
            <div class="row">
                <span style="font-weight: bold;">ENGINES</span>
                <div class="display" id="eng-timer">00:00:00</div>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-start" id="eng-start-btn" onclick="startEng()">START</button>
                    <button class="btn-stop" id="eng-stop-btn" onclick="stopEng()" disabled>STOP</button>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-item">TIMES<span class="stat-val" id="eng-ts">--:-- to --:--</span></div>
                <div class="stat-item">MINS<span class="stat-val" id="eng-mins">0</span></div>
                <div class="stat-item">DECIMAL<span class="stat-val" id="eng-dec">0.0</span></div>
            </div>
        </div>

        <div class="section-label">Flight Log</div>
        <div class="timer-card flight-bg">
            <div class="row">
                <span style="font-weight: bold;">AIRBORNE</span>
                <div class="display" id="fl-timer">00:00:00</div>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-start" id="fl-start-btn" onclick="startFl()">UP</button>
                    <button class="btn-stop" id="fl-stop-btn" onclick="stopFl()" disabled>DOWN</button>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-item">TIMES<span class="stat-val" id="fl-ts">--:-- to --:--</span></div>
                <div class="stat-item">MINS<span class="stat-val" id="fl-mins">0</span></div>
                <div class="stat-item">DECIMAL<span class="stat-val" id="fl-dec">0.0</span></div>
            </div>
        </div>

        <div class="mullah-box">
            <table class="mullah-table">
                <tr><th>Flt Pay</th><th>Tax</th><th>Wife</th><th>Phil</th></tr>
                <tr><td id="m-flt">$0.00</td><td id="m-tax">$0.00</td><td id="m-wife">$0.00</td><td id="m-phil">$0.00</td></tr>
            </table>
        </div>

        <button class="action-btn" style="background: #007bff;" onclick="saveLog()">SAVE TO LOGBOOK</button>
        <button class="action-btn" style="background: #6c757d;" onclick="toggleHistory(true)">VIEW LOGBOOK</button>
        <button class="action-btn" style="background: #000;" onclick="location.reload()">RESET CURRENT</button>
    </div>

    <div id="history-page">
        <h1>Logbook Records</h1>
        <button class="action-btn" style="background: #000;" onclick="toggleHistory(false)">BACK TO TIMERS</button>
        
        <table class="log-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th class="sep">Engine Run</th>
                    <th>E-Min</th>
                    <th>E-Dec</th>
                    <th class="sep">Flight Time</th>
                    <th>F-Min</th>
                    <th>F-Dec</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>

        <button class="delete-btn" onclick="clearLogs()">DELETE ALL RECORDS</button>
    </div>

<script>
    let eng = { elapsed: 0, startTS: null, stopTS: null, interval: null, startTime: null };
    let flt = { elapsed: 0, startTS: null, stopTS: null, interval: null, startTime: null };

    function getNow() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }); }
    function fmtHMS(ms) { let s = Math.floor(ms/1000); return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => v.toString().padStart(2,'0')).join(':'); }

    function updateStats() {
        let eMins = Math.floor(eng.elapsed / 60000);
        let eDec = (eng.elapsed / 3600000).toFixed(1);
        document.getElementById('eng-mins').textContent = eMins;
        document.getElementById('eng-dec').textContent = eDec;
        document.getElementById('eng-ts').textContent = (eng.startTS || "--:--") + " to " + (eng.stopTS || "--:--");
        
        let pay = (eng.elapsed / 3600000) * 265;
        document.getElementById('m-flt').textContent = "$" + pay.toFixed(2);
        document.getElementById('m-tax').textContent = "$" + (pay * 0.5).toFixed(2);
        document.getElementById('m-wife').textContent = "$" + (pay * 0.5 * 0.75).toFixed(2);
        document.getElementById('m-phil').textContent = "$" + (pay * 0.5 * 0.25).toFixed(2);

        let fMins = Math.floor(flt.elapsed / 60000);
        let fDec = (flt.elapsed / 3600000).toFixed(1);
        document.getElementById('fl-mins').textContent = fMins;
        document.getElementById('fl-dec').textContent = fDec;
        document.getElementById('fl-ts').textContent = (flt.startTS || "--:--") + " to " + (flt.stopTS || "--:--");
    }

    function startEng() {
        if (!eng.startTS) eng.startTS = getNow();
        eng.startTime = Date.now() - eng.elapsed;
        eng.interval = setInterval(() => {
            eng.elapsed = Date.now() - eng.startTime;
            document.getElementById('eng-timer').textContent = fmtHMS(eng.elapsed);
            updateStats();
        }, 1000);
        document.getElementById('eng-start-btn').disabled = true;
        document.getElementById('eng-stop-btn').disabled = false;
    }

    function stopEng() {
        clearInterval(eng.interval);
        eng.stopTS = getNow();
        updateStats();
        document.getElementById('eng-start-btn').disabled = false;
        document.getElementById('eng-stop-btn').disabled = true;
    }

    function startFl() {
        if (!flt.startTS) flt.startTS = getNow();
        flt.startTime = Date.now() - flt.elapsed;
        flt.interval = setInterval(() => {
            flt.elapsed = Date.now() - flt.startTime;
            document.getElementById('fl-timer').textContent = fmtHMS(flt.elapsed);
            updateStats();
        }, 1000);
        document.getElementById('fl-start-btn').disabled = true;
        document.getElementById('fl-stop-btn').disabled = false;
    }

    function stopFl() {
        clearInterval(flt.interval);
        flt.stopTS = getNow();
        updateStats();
        document.getElementById('fl-start-btn').disabled = false;
        document.getElementById('fl-stop-btn').disabled = true;
    }

    function saveLog() {
        const log = JSON.parse(localStorage.getItem('pLog') || '[]');
        log.push({
            d: new Date().toLocaleDateString(),
            eT: (eng.startTS || "--:--") + "-" + (eng.stopTS || "--:--"),
            eM: document.getElementById('eng-mins').textContent,
            eD: document.getElementById('eng-dec').textContent,
            fT: (flt.startTS || "--:--") + "-" + (flt.stopTS || "--:--"),
            fM: document.getElementById('fl-mins').textContent,
            fD: document.getElementById('fl-dec').textContent
        });
        localStorage.setItem('pLog', JSON.stringify(log));
        alert("Flight Saved to Memory.");
    }

    function toggleHistory(show) {
        document.getElementById('history-page').style.display = show ? 'block' : 'none';
        if (show) {
            const log = JSON.parse(localStorage.getItem('pLog') || '[]');
            document.getElementById('log-body').innerHTML = log.map(e => `
                <tr>
                    <td>${e.d}</td>
                    <td class="sep">${e.eT}</td><td>${e.eM}</td><td>${e.eD}</td>
                    <td class="sep">${e.fT}</td><td>${e.fM}</td><td>${e.fD}</td>
                </tr>`).join('');
        }
    }

    function clearLogs() {
        if(confirm("Confirm: This will permanently delete ALL saved flight records.")) {
            localStorage.removeItem('pLog');
            toggleHistory(true);
        }
    }
</script>
</body>
</html>
