<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>HeliTimer v1.24</title>
    <style>
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* Grid ensures all columns are identical width across all rows */
        .timer-row { 
            display: grid; 
            grid-template-columns: 60px 180px 1fr; 
            align-items: center; 
            gap: 10px;
            padding: 12px; 
            border: 2px solid #000; 
            border-radius: 8px; 
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        .label { font-size: 0.9rem; font-weight: bold; }
        .controls { display: flex; gap: 4px; width: 180px; }
        
        button { 
            font-weight: bold; border-radius: 6px; border: 2px solid #000; 
            cursor: pointer; text-transform: uppercase; -webkit-tap-highlight-color: transparent;
        }

        .btn-timer { flex: 1; padding: 12px 0; font-size: 0.8rem; }
        .btn-start { background: #00ff00; }
        .btn-stop { background: #ff0000; color: #fff; }
        .btn-stop:disabled { background: #600; opacity: 0.5; }
        .btn-row-reset { background: #ccc; max-width: 45px; }
        
        .time-display { 
            font-family: monospace; font-size: 1.3rem; font-weight: bold; 
            text-align: right; white-space: nowrap;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .stat-box { background: #f0f0f0; padding: 10px; border: 2px solid #000; border-radius: 8px; text-align: center; }
        .ts-info { font-size: 0.7rem; height: 2.5em; display: block; }
        .total-hms { font-size: 1.2rem; font-family: monospace; display: block; border-top: 1px solid #000; margin-top: 5px; padding-top: 5px; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .btn-act { padding: 15px 0; color: #fff; font-size: 0.85rem; }
        
        #log-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .log-table th, .log-table td { border: 1px solid #000; padding: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="main-timer-page" class="container">
    <h2 style="text-align:center; margin: 0 0 10px 0;">Flight Timer v1.24</h2>
    
    <div class="timer-row">
        <div class="label">ENG 1</div>
        <div class="controls">
            <button class="btn-timer btn-start" id="e1-start" onclick="startT('e1')">START</button>
            <button class="btn-timer btn-stop" id="e1-stop" onclick="stopT('e1')" disabled>STOP</button>
            <button class="btn-timer btn-row-reset" onclick="resetRow('e1')">RST</button>
        </div>
        <div class="time-display" id="e1-disp">00:00:00</div>
    </div>

    <div class="timer-row">
        <div class="label">ENG 2</div>
        <div class="controls">
            <button class="btn-timer btn-start" id="e2-start" onclick="startT('e2')">START</button>
            <button class="btn-timer btn-stop" id="e2-stop" onclick="stopT('e2')" disabled>STOP</button>
            <button class="btn-timer btn-row-reset" onclick="resetRow('e2')">RST</button>
        </div>
        <div class="time-display" id="e2-disp">00:00:00</div>
    </div>

    <div class="timer-row" style="background:#eef;">
        <div class="label">FLIGHT</div>
        <div class="controls">
            <button class="btn-timer btn-start" id="fl-start" onclick="startT('fl')">START</button>
            <button class="btn-timer btn-stop" id="fl-stop" onclick="stopT('fl')" disabled>STOP</button>
            <button class="btn-timer btn-row-reset" onclick="resetRow('fl')">RST</button>
        </div>
        <div class="time-display" id="fl-disp">00:00:00</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="ts-info">ENG RUN<br><span id="e-ts">--:-- to --:--</span></span>
            <span class="total-hms" id="e-hms">00:00:00</span>
        </div>
        <div class="stat-box" style="background:#eef;">
            <span class="ts-info">FLIGHT<br><span id="f-ts">--:-- to --:--</span></span>
            <span class="total-hms" id="f-hms">00:00:00</span>
        </div>
    </div>

    <div class="action-row">
        <button class="btn-act" style="background:#000;" onclick="location.reload()">RELOAD</button>
        <button class="btn-act" style="background:#007bff;" onclick="saveLog()">SAVE</button>
        <button class="btn-act" style="background:#666;" onclick="showLog()">LOGS</button>
    </div>
</div>

<div id="log-page">
    <button onclick="hideLog()" style="background:#28a745; color:#fff; width:100%; padding:18px; font-weight:bold; margin-bottom:12px; border:2px solid #000; border-radius:8px;">BACK TO TIMER</button>
    <table class="log-table">
        <thead><tr><th>Date</th><th>Eng Block</th><th>H</th><th>Flt Block</th><th>H</th></tr></thead>
        <tbody id="log-body"></tbody>
    </table>
    <button onclick="clearLogs()" style="background:#dc3545; color:#fff; width:100%; padding:10px; margin-top:25px; border-radius:8px;">DELETE ALL LOGS</button>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.error(e));
    }

    let timers = { 
        e1: { elapsed: 0, start: null, interval: null, running: false },
        e2: { elapsed: 0, start: null, interval: null, running: false },
        fl: { elapsed: 0, start: null, interval: null, running: false, tsS: null, tsE: null },
        engGlobal: { start: null, end: null }
    };

    function getTimeStr(d) {
        const date = d ? new Date(d) : new Date();
        return date.toTimeString().split(' ')[0].substring(0, 5);
    }

    function format(ms) {
        let s = Math.floor(ms / 1000);
        let h = Math.floor(s / 3600);
        let m = Math.floor((s % 3600) / 60);
        let sec = s % 60;
        return [h, m, sec].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function updateStats() {
        let engMs = (timers.engGlobal.end || (timers.engGlobal.start ? Date.now() : timers.engGlobal.start)) - timers.engGlobal.start || 0;
        document.getElementById('e-hms').innerText = format(engMs);
        document.getElementById('e-ts').innerText = (timers.engGlobal.start ? getTimeStr(timers.engGlobal.start) : "--:--") + " to " + (timers.engGlobal.end ? getTimeStr(timers.engGlobal.end) : "--:--");
        document.getElementById('f-hms').innerText = format(timers.fl.elapsed);
        document.getElementById('f-ts').innerText = (timers.fl.tsS || "--:--") + " to " + (timers.fl.tsE || "--:--");
    }

    function startT(id) {
        timers[id].running = true;
        timers[id].start = Date.now() - timers[id].elapsed;
        if (id === 'fl' && !timers.fl.tsS) timers.fl.tsS = getTimeStr();
        if ((id === 'e1' || id === 'e2') && !timers.engGlobal.start) timers.engGlobal.start = Date.now();
        timers[id].interval = setInterval(() => {
            timers[id].elapsed = Date.now() - timers[id].start;
            document.getElementById(id + '-disp').innerText = format(timers[id].elapsed);
            updateStats();
        }, 1000);
        document.getElementById(id + '-start').disabled = true;
        document.getElementById(id + '-stop').disabled = false;
    }

    function stopT(id) {
        timers[id].running = false;
        clearInterval(timers[id].interval);
        if (id === 'fl') timers.fl.tsE = getTimeStr();
        if ((id === 'e1' || id === 'e2') && !timers.e1.running && !timers.e2.running) timers.engGlobal.end = Date.now();
        document.getElementById(id + '-start').disabled = false;
        document.getElementById(id + '-stop').disabled = true;
        updateStats();
    }

    function resetRow(id) {
        stopT(id);
        timers[id].elapsed = 0;
        document.getElementById(id + '-disp').innerText = "00:00:00";
        if (id === 'fl') { timers.fl.tsS = null; timers.fl.tsE = null; }
        if (id !== 'fl' && !timers.e1.running && !timers.e2.running) { timers.engGlobal.start = null; timers.engGlobal.end = null; }
        updateStats();
    }

    function saveLog() {
        let engMs = (timers.engGlobal.end || (timers.engGlobal.start ? Date.now() : timers.engGlobal.start)) - timers.engGlobal.start || 0;
        let entry = {
            date: new Date().toLocaleDateString(),
            eb: document.getElementById('e-ts').innerText,
            eh: (engMs / 3600000).toFixed(4),
            fb: document.getElementById('f-ts').innerText,
            fh: (timers.fl.elapsed / 3600000).toFixed(4)
        };
        let log = JSON.parse(localStorage.getItem('hLogV24') || '[]');
        log.push(entry);
        localStorage.setItem('hLogV24', JSON.stringify(log));
        alert("Flight Saved.");
    }

    function showLog() {
        document.getElementById('main-timer-page').style.display = 'none';
        document.getElementById('log-page').style.display = 'block';
        let log = JSON.parse(localStorage.getItem('hLogV24') || '[]');
        document.getElementById('log-body').innerHTML = log.map(i => `<tr><td>${i.date}</td><td>${i.eb}</td><td>${i.eh}</td><td>${i.fb}</td><td>${i.fh}</td></tr>`).reverse().join('');
    }

    function hideLog() {
        document.getElementById('log-page').style.display = 'none';
        document.getElementById('main-timer-page').style.display = 'block';
    }

    function clearLogs() {
        if(confirm("Clear logbook?")) { localStorage.removeItem('hLogV24'); showLog(); }
    }
</script>
</body>
</html>
