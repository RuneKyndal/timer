<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Helicopter Flight Timer v1.15</title>
    <style>
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.5rem; margin: 5px 0; border-bottom: 3px solid #000; width: 98%; max-width: 600px; text-align: center; }
        
        .ui-element { width: 98%; max-width: 600px; box-sizing: border-box; margin-bottom: 8px; }

        .timer-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 2px solid #000; border-radius: 8px; }
        .label { font-size: 0.9rem; font-weight: bold; width: 50px; }
        .controls { display: flex; gap: 4px; }
        
        button { padding: 8px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; border: 2px solid #000; cursor: pointer; }
        .btn-start { background: #00ff00; }
        .btn-stop { background: #ff0000; color: #fff; }
        .btn-row-reset { background: #eee; font-size: 0.7rem; }
        
        .time-display { font-family: monospace; font-size: 1.2rem; font-weight: bold; min-width: 85px; text-align: right; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #f0f0f0; padding: 10px; border: 2px solid #000; border-radius: 8px; font-weight: bold; text-align: center; }
        .ts-info { font-size: 0.7rem; color: #444; display: block; margin-bottom: 4px; }
        .total-hms { font-size: 1.3rem; font-family: monospace; display: block; border-top: 1px solid #aaa; margin-top: 5px; padding-top: 5px; }
        .total-dec { font-size: 1rem; font-family: monospace; color: #333; display: block; margin-top: 2px; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
        .btn-act { padding: 15px 0; text-transform: uppercase; color: #fff; }
        .b-reset { background: #000; }
        .b-save { background: #007bff; }
        .b-load { background: #6c757d; }

        #log-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; margin: 15px 0; }
        .log-table th, .log-table td { border: 1px solid #000; padding: 4px; text-align: center; }
        
        .log-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn-log-back { background: #28a745; color: white; padding: 15px; }
        .btn-log-del { background: #dc3545; color: white; padding: 15px; }
    </style>
</head>
<body>

    <div id="main-timer-page" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1>Helicopter Flight Timer</h1>

        <div class="ui-element timer-row">
            <div class="label">ENG 1</div>
            <div class="controls">
                <button class="btn-start" id="e1-start" onclick="startT('e1')">START</button>
                <button class="btn-stop" id="e1-stop" onclick="stopT('e1')" disabled>STOP</button>
                <button class="btn-row-reset" onclick="resetRow('e1')">RST</button>
            </div>
            <div class="time-display" id="e1-disp">00:00:00</div>
        </div>

        <div class="ui-element timer-row">
            <div class="label">ENG 2</div>
            <div class="controls">
                <button class="btn-start" id="e2-start" onclick="startT('e2')">START</button>
                <button class="btn-stop" id="e2-stop" onclick="stopT('e2')" disabled>STOP</button>
                <button class="btn-row-reset" onclick="resetRow('e2')">RST</button>
            </div>
            <div class="time-display" id="e2-disp">00:00:00</div>
        </div>

        <div class="ui-element timer-row" style="background: #e6f3ff;">
            <div class="label">FLIGHT</div>
            <div class="controls">
                <button class="btn-start" id="fl-start" onclick="startT('fl')">START</button>
                <button class="btn-stop" id="fl-stop" onclick="stopT('fl')" disabled>STOP</button>
                <button class="btn-row-reset" onclick="resetRow('fl')">RST</button>
            </div>
            <div class="time-display" id="fl-disp">00:00:00</div>
        </div>

        <div class="ui-element stats-grid">
            <div class="stat-box">
                <span class="ts-info">ENGINE RUN<br><span id="e-ts">--:--:-- to --:--:--</span></span>
                <span class="total-hms" id="e-hms">00:00:00</span>
                <span class="total-dec" id="e-dec">0.0000 h</span>
            </div>
            <div class="stat-box" style="background: #e6f3ff;">
                <span class="ts-info">FLIGHT TIME<br><span id="f-ts">--:--:-- to --:--:--</span></span>
                <span class="total-hms" id="f-hms">00:00:00</span>
                <span class="total-dec" id="f-dec">0.0000 h</span>
            </div>
        </div>

        <div class="ui-element action-row">
            <button class="btn-act b-reset" onclick="location.reload()">RESET</button>
            <button class="btn-act b-save" onclick="saveLog()">Save Log</button>
            <button class="btn-act b-load" onclick="toggleLog(true)">Load Log</button>
        </div>
    </div>

    <div id="log-page">
        <h1>Flight Logbook</h1>
        <div class="log-btn-row">
            <button class="btn-log-back" onclick="toggleLog(false)">BACK</button>
            <button class="btn-log-del" onclick="clearAll()">DELETE LOG</button>
        </div>
        <table class="log-table">
            <thead>
                <tr><th>Date</th><th>Eng Block</th><th>Eng</th><th>Flt Block</th><th>FLT</th></tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

<script>
    let t = { e1:{e:0,s:null,i:null,r:false}, e2:{e:0,s:null,i:null,r:false}, fl:{e:0,s:null,i:null,r:false}, gE:{start:null,stop:null} };

    function nowHMS() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); }
    function fmtHMS(ms) { let s=Math.floor(ms/1000); return [Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>v.toString().padStart(2,'0')).join(':'); }

    function updateUI() {
        let eMs = (t.gE.stop || (t.gE.start ? Date.now() : t.gE.start)) - t.gE.start || 0;
        document.getElementById('e-hms').textContent = fmtHMS(eMs);
        document.getElementById('e-dec').textContent = (eMs/3600000).toFixed(4) + " h";
        document.getElementById('e-ts').textContent = (t.gE.start ? new Date(t.gE.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) : "--:--:--") + " to " + (t.gE.stop ? new Date(t.gE.stop).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) : "--:--:--");
        
        let fMs = t.fl.e;
        document.getElementById('f-hms').textContent = fmtHMS(fMs);
        document.getElementById('f-dec').textContent = (fMs/3600000).toFixed(4) + " h";
        document.getElementById('f-ts').textContent = (t.fl.startTS || "--:--:--") + " to " + (t.fl.stopTS || "--:--:--");
    }

    function startT(k) {
        t[k].r = true; t[k].s = Date.now() - t[k].e;
        if(k==='fl' && !t.fl.startTS) t.fl.startTS = nowHMS();
        if((k==='e1'||k==='e2') && !t.gE.start) t.gE.start = Date.now();
        t[k].i = setInterval(() => {
            t[k].e = Date.now() - t[k].s;
            document.getElementById(k+'-disp').textContent = fmtHMS(t[k].e);
            updateUI();
        }, 1000);
        document.getElementById(k+'-start').disabled = true; document.getElementById(k+'-stop').disabled = false;
    }

    function stopT(k) {
        t[k].r = false; clearInterval(t[k].i);
        if(k==='fl') t.fl.stopTS = nowHMS();
        if((k==='e1'||k==='e2') && !t.e1.r && !t.e2.r) t.gE.stop = Date.now();
        document.getElementById(k+'-start').disabled = false; document.getElementById(k+'-stop').disabled = true;
        updateUI();
    }

    function resetRow(k) {
        stopT(k); t[k].e = 0; document.getElementById(k+'-disp').textContent = "00:00:00";
        if(k==='fl') { t.fl.startTS = null; t.fl.stopTS = null; }
        if(k!=='fl' && !t.e1.r && !t.e2.r) { t.gE.start = null; t.gE.stop = null; }
        updateUI();
    }

    function saveLog() {
        const log = JSON.parse(localStorage.getItem('heliLogV15') || '[]');
        let eMs = (t.gE.stop || (t.gE.start ? Date.now() : t.gE.start)) - t.gE.start || 0;
        let fMs = t.fl.e;
        log.push({
            d: new Date().toLocaleDateString(),
            eb: document.getElementById('e-ts').textContent, en: (eMs/3600000).toFixed(4),
            fb: document.getElementById('f-ts').textContent, fl: (fMs/3600000).toFixed(4)
        });
        localStorage.setItem('heliLogV15', JSON.stringify(log));
        alert("Flight Saved.");
    }

    function toggleLog(show) {
        document.getElementById('log-page').style.display = show ? 'block' : 'none';
        if(show) {
            const data = JSON.parse(localStorage.getItem('heliLogV15') || '[]');
            document.getElementById('log-body').innerHTML = data.map(i => `<tr><td>${i.d}</td><td>${i.eb}</td><td>${i.en}</td><td>${i.fb}</td><td>${i.fl}</td></tr>`).join('');
        }
    }

    function clearAll() { if(confirm("Nuke history?")) { localStorage.removeItem('heliLogV15'); toggleLog(true); } }
</script>
</body>
</html>
