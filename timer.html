<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HeliTimer">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Helicopter Flight Timer v1.19</title>
    <style>
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        h1 { font-size: 1.5rem; margin: 5px 0; border-bottom: 3px solid #000; width: 98%; max-width: 600px; text-align: center; }
        
        .ui-element { width: 98%; max-width: 600px; box-sizing: border-box; margin-bottom: 8px; }

        .timer-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 2px solid #000; border-radius: 10px; }
        .label { font-size: 1rem; font-weight: bold; width: 60px; }
        
        .controls { display: flex; gap: 8px; flex-grow: 1; justify-content: center; }
        
        button { font-weight: bold; border-radius: 8px; border: 2px solid #000; cursor: pointer; text-transform: uppercase; touch-action: manipulation; }
        
        /* High-Visibility Buttons */
        .btn-timer { min-height: 60px; min-width: 85px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        
        .btn-start { background: #00ff00; color: #000; }
        .btn-stop { background: #ff0000; color: #fff; }
        .btn-stop:disabled { background: #660000; color: #aaa; opacity: 0.6; }
        .btn-row-reset { background: #ddd; font-size: 0.9rem; min-width: 60px; }
        
        .time-display { font-family: monospace; font-size: 1.4rem; font-weight: bold; min-width: 100px; text-align: right; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #f0f0f0; padding: 12px; border: 2px solid #000; border-radius: 10px; font-weight: bold; text-align: center; }
        .ts-info { font-size: 0.75rem; color: #444; display: block; margin-bottom: 6px; min-height: 2.5em; }
        .total-hms { font-size: 1.4rem; font-family: monospace; display: block; border-top: 1px solid #aaa; margin-top: 6px; padding-top: 6px; }
        .total-dec { font-size: 1.1rem; font-family: monospace; color: #222; display: block; margin-top: 4px; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-act { padding: 20px 0; color: #fff; font-size: 1rem; }
        .b-reset { background: #000; }
        .b-save { background: #007bff; }
        .b-load { background: #6c757d; }

        #log-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin: 20px 0; }
        .log-table th, .log-table td { border: 1px solid #000; padding: 6px; text-align: center; }
        
        .log-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .btn-log-back { background: #28a745; color: white; padding: 20px; font-size: 1.1rem; }
        .btn-log-del { background: #dc3545; color: white; padding: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="main-timer-page" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1>Helicopter Flight Timer</h1>

        <div class="ui-element timer-row">
            <div class="label">ENG 1</div>
            <div class="controls">
                <button class="btn-timer btn-start" id="e1-start" onclick="startT('e1')">START</button>
                <button class="btn-timer btn-stop" id="e1-stop" onclick="stopT('e1')" disabled>STOP</button>
                <button class="btn-timer btn-row-reset" onclick="resetRow('e1')">RST</button>
            </div>
            <div class="time-display" id="e1-disp">00:00:00</div>
        </div>

        <div class="ui-element timer-row">
            <div class="label">ENG 2</div>
            <div class="controls">
                <button class="btn-timer btn-start" id="e2-start" onclick="startT('e2')">START</button>
                <button class="btn-timer btn-stop" id="e2-stop" onclick="stopT('e2')" disabled>STOP</button>
                <button class="btn-timer btn-row-reset" onclick="resetRow('e2')">RST</button>
            </div>
            <div class="time-display" id="e2-disp">00:00:00</div>
        </div>

        <div class="ui-element timer-row" style="background: #e6f3ff;">
            <div class="label">FLIGHT</div>
            <div class="controls">
                <button class="btn-timer btn-start" id="fl-start" onclick="startT('fl')">START</button>
                <button class="btn-timer btn-stop" id="fl-stop" onclick="stopT('fl')" disabled>STOP</button>
                <button class="btn-timer btn-row-reset" onclick="resetRow('fl')">RST</button>
            </div>
            <div class="time-display" id="fl-disp">00:00:00</div>
        </div>

        <div class="ui-element stats-grid">
            <div class="stat-box">
                <span class="ts-info">ENGINE RUN<br><span id="e-ts">--:--:-- to --:--:--</span></span>
                <span class="total-hms" id="e-hms">00:00:00</span>
                <span class="total-dec" id="e-dec">0.0000 h</span>
            </div>
            <div class="stat-box" style="background: #e6f3ff;">
                <span class="ts-info">FLIGHT TIME<br><span id="f-ts">--:--:-- to --:--:--</span></span>
                <span class="total-hms" id="f-hms">00:00:00</span>
                <span class="total-dec" id="f-dec">0.0000 h</span>
            </div>
        </div>

        <div class="ui-element action-row">
            <button class="btn-act b-reset" onclick="location.reload()">RESET</button>
            <button class="btn-act b-save" onclick="saveLog()">Save Log</button>
            <button class="btn-act b-load" onclick="toggleLog(true)">Load Log</button>
        </div>
    </div>

    <div id="log-page">
        <h1>Flight Logbook</h1>
        <div class="log-btn-row">
            <button class="btn-log-back" onclick="toggleLog(false)">BACK</button>
            <button class="btn-log-del" onclick="clearAll()">DELETE LOG</button>
        </div>
        <table class="log-table">
            <thead>
                <tr><th>Date</th><th>Eng Block</th><th>Eng</th><th>Flt Block</th><th>FLT</th></tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

<script>
    // SELF-REGISTERING SERVICE WORKER (For Offline Support)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const code = `
                const cacheName = 'heli-v1.19';
                self.addEventListener('install', e => e.waitUntil(caches.open(cacheName).then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([code], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log("Offline mode limited: Direct file open detected."));
        });
    }

    let t = { e1:{e:0,s:null,i:null,r:false}, e2:{e:0,s:null,i:null,r:false}, fl:{e:0,s:null,i:null,r:false}, gE:{start:null,stop:null} };

    function getCleanTime(dateObj) {
        let d = dateObj ? new Date(dateObj) : new Date();
        return [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function fmtHMS(ms) {
        let s = Math.floor(ms / 1000);
        return [Math.floor(s / 3600), Math.floor((s % 3600) / 60), s % 60].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function updateUI() {
        let eMs = (t.gE.stop || (t.gE.start ? Date.now() : t.gE.start)) - t.gE.start || 0;
        document.getElementById('e-hms').textContent = fmtHMS(eMs);
        document.getElementById('e-dec').textContent = (eMs / 3600000).toFixed(4) + " h";
        document.getElementById('e-ts').textContent = (t.gE.start ? getCleanTime(t.gE.start) : "--:--:--") + " to " + (t.gE.stop ? getCleanTime(t.gE.stop) : "--:--:--");
        
        let fMs = t.fl.e;
        document.getElementById('f-hms').textContent = fmtHMS(fMs);
        document.getElementById('f-dec').textContent = (fMs / 3600000).toFixed(4) + " h";
        document.getElementById('f-ts').textContent = (t.fl.startTS || "--:--:--") + " to " + (t.fl.stopTS || "--:--:--");
    }

    function startT(k) {
        t[k].r = true; t[k].s = Date.now() - t[k].e;
        if(k === 'fl' && !t.fl.startTS) t.fl.startTS = getCleanTime();
        if((k === 'e1' || k === 'e2') && !t.gE.start) { t.gE.start = Date.now(); t.gE.stop = null; }
        t[k].i = setInterval(() => {
            t[k].e = Date.now() - t[k].s;
            document.getElementById(k + '-disp').textContent = fmtHMS(t[k].e);
            updateUI();
        }, 1000);
        document.getElementById(k + '-start').disabled = true; document.getElementById(k + '-stop').disabled = false;
    }

    function stopT(k) {
        t[k].r = false; clearInterval(t[k].i);
        if(k === 'fl') t.fl.stopTS = getCleanTime();
        if((k === 'e1' || k === 'e2') && !t.e1.r && !t.e2.r) t.gE.stop = Date.now();
        document.getElementById(k + '-start').disabled = false; document.getElementById(k + '-stop').disabled = true;
        updateUI();
    }

    function resetRow(k) {
        stopT(k); t[k].e = 0; document.getElementById(k + '-disp').textContent = "00:00:00";
        if(k === 'fl') { t.fl.startTS = null; t.fl.stopTS = null; }
        if(k !== 'fl' && !t.e1.r && !t.e2.r) { t.gE.start = null; t.gE.stop = null; }
        updateUI();
    }

    function saveLog() {
        try {
            const log = JSON.parse(localStorage.getItem('heliLogV19') || '[]');
            let eMs = (t.gE.stop || (t.gE.start ? Date.now() : t.gE.start)) - t.gE.start || 0;
            log.push({
                d: new Date().toLocaleDateString(),
                eb: document.getElementById('e-ts').textContent, en: (eMs / 3600000).toFixed(4),
                fb: document.getElementById('f-ts').textContent, fl: (t.fl.e / 3600000).toFixed(4)
            });
            localStorage.setItem('heliLogV19', JSON.stringify(log));
            alert("Flight Logged.");
        } catch(e) { alert("Save failed: Device storage restricted."); }
    }

    function toggleLog(show) {
        document.getElementById('log-page').style.display = show ? 'block' : 'none';
        if(show) {
            const data = JSON.parse(localStorage.getItem('heliLogV19') || '[]');
            document.getElementById('log-body').innerHTML = data.map(i => `<tr><td>${i.d}</td><td>${i.eb}</td><td>${i.en}</td><td>${i.fb}</td><td>${i.fl}</td></tr>`).reverse().join('');
        }
    }

    function clearAll() { if(confirm("Clear all records?")) { localStorage.removeItem('heliLogV19'); toggleLog(true); } }
</script>
</body>
</html>
