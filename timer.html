<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Phil's timer version 1.1</title>
    <link rel="manifest" href="timer.json">
    <style>
        body { 
            background: #fff; color: #000; font-family: sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 1.6rem; margin: 10px 0; border-bottom: 3px solid #000; width: 100%; text-align: center; }
        
        .timer-row {
            width: 98%; max-width: 600px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; padding: 10px; border: 2px solid #000; border-radius: 8px;
        }

        .label { font-size: 1rem; font-weight: bold; width: 60px; }
        .controls { display: flex; gap: 5px; }
        
        button {
            padding: 10px 12px; font-size: 0.9rem; font-weight: bold;
            border-radius: 4px; border: 2px solid #000; cursor: pointer;
        }
        .btn-start { background: #00ff00; color: #000; }
        .btn-stop { background: #ff0000; color: #fff; }
        .btn-clear { background: #fff; color: #000; }
        .btn-reset-all { 
            background: #000; color: #fff; width: 98%; max-width: 600px; 
            margin-top: 20px; padding: 18px; font-size: 1.2rem; 
        }

        .time-display {
            font-family: monospace; font-size: 1.4rem; font-weight: bold;
            min-width: 100px; text-align: right;
        }

        .stats-grid {
            width: 98%; max-width: 600px; margin-top: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .stat-box { 
            background: #f0f0f0; padding: 12px; border: 2px solid #000; border-radius: 8px;
            font-weight: bold; text-align: center;
        }
        .total-val { font-size: 1.4rem; font-family: monospace; display: block; margin-top: 5px; border-top: 1px solid #aaa; padding-top: 5px; }
        .timestamp { font-size: 1.2rem; color: #000; }
        .ts-label { font-size: 0.8rem; color: #555; text-transform: uppercase; margin-bottom: 2px; display: block; }
    </style>
</head>
<body>

    <h1>Phils Flight Timer</h1>

    <div class="timer-row">
        <div class="label">ENG 1</div>
        <div class="controls">
            <button class="btn-start" id="e1-start" onclick="startTimer('e1')">START</button>
            <button class="btn-stop" id="e1-stop" onclick="stopTimer('e1')" disabled>STOP</button>
            <button class="btn-clear" onclick="resetRow('e1')">RST</button>
        </div>
        <div class="time-display" id="e1-display">00:00:00</div>
    </div>

    <div class="timer-row">
        <div class="label">ENG 2</div>
        <div class="controls">
            <button class="btn-start" id="e2-start" onclick="startTimer('e2')">START</button>
            <button class="btn-stop" id="e2-stop" onclick="stopTimer('e2')" disabled>STOP</button>
            <button class="btn-clear" onclick="resetRow('e2')">RST</button>
        </div>
        <div class="time-display" id="e2-display">00:00:00</div>
    </div>

    <div class="timer-row" style="background: #e6f3ff;">
        <div class="label">FLIGHT</div>
        <div class="controls">
            <button class="btn-start" id="fl-start" onclick="startTimer('fl')">START</button>
            <button class="btn-stop" id="fl-stop" onclick="stopTimer('fl')" disabled>STOP</button>
            <button class="btn-clear" onclick="resetRow('fl')">RST</button>
        </div>
        <div class="time-display" id="fl-display">00:00:00</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            ENGINE RUN
            <div style="margin: 8px 0;">
                <span class="ts-label">Start</span>
                <span class="timestamp" id="eng-first-start">--:--</span>
                <div style="margin-top: 8px;">
                    <span class="ts-label">Stop</span>
                    <span class="timestamp" id="eng-last-stop">--:--</span>
                </div>
            </div>
            <div class="total-val">
                <span id="eng-run-hms">00:00:00</span>
                <div style="font-size: 1.1rem;" id="eng-run-dec">0.0</div>
            </div>
        </div>

        <div class="stat-box" style="background: #e6f3ff;">
            FLIGHT TIME
            <div style="margin: 8px 0;">
                <span class="ts-label">UP</span>
                <span class="timestamp" id="up-time">--:--</span>
                <div style="margin-top: 8px;">
                    <span class="ts-label">DN</span>
                    <span class="timestamp" id="down-time">--:--</span>
                </div>
            </div>
            <div class="total-val">
                <span id="fl-run-hms">00:00:00</span>
                <div style="font-size: 1.1rem;" id="fl-run-dec">0.0</div>
            </div>
        </div>
    </div>

    <button class="btn-reset-all" onclick="masterReset()">RESET ALL DATA</button>

<script>
    let timers = {
        e1: { elapsed: 0, start: null, interval: null, running: false },
        e2: { elapsed: 0, start: null, interval: null, running: false },
        fl: { elapsed: 0, start: null, interval: null, running: false },
        globalEng: { startTime: null, stopTime: null, elapsed: 0, interval: null }
    };

    function getTimeOfDay() {
        let now = new Date();
        return now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }

    function formatHMS(ms) {
        let s = Math.floor(ms / 1000);
        return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => v.toString().padStart(2,'0')).join(':');
    }

    function startTimer(key) {
        timers[key].running = true;
        timers[key].start = Date.now() - timers[key].elapsed;
        
        if (key === 'fl') {
            document.getElementById('up-time').textContent = getTimeOfDay();
        }

        if (key === 'e1' || key === 'e2') {
            if (!timers.globalEng.startTime) {
                timers.globalEng.startTime = Date.now();
                document.getElementById('eng-first-start').textContent = getTimeOfDay();
            }
            if (!timers.globalEng.interval) {
                timers.globalEng.interval = setInterval(() => {
                    let run = Date.now() - timers.globalEng.startTime;
                    document.getElementById('eng-run-hms').textContent = formatHMS(run);
                    document.getElementById('eng-run-dec').textContent = (run / 3600000).toFixed(1);
                }, 1000);
            }
        }

        timers[key].interval = setInterval(() => {
            timers[key].elapsed = Date.now() - timers[key].start;
            document.getElementById(key + '-display').textContent = formatHMS(timers[key].elapsed);
            if (key === 'fl') {
                document.getElementById('fl-run-hms').textContent = formatHMS(timers[key].elapsed);
                document.getElementById('fl-run-dec').textContent = (timers[key].elapsed / 3600000).toFixed(1);
            }
        }, 1000);

        document.getElementById(key + '-start').disabled = true;
        document.getElementById(key + '-stop').disabled = false;
    }

    function stopTimer(key) {
        timers[key].running = false;
        clearInterval(timers[key].interval);
        
        if (key === 'fl') {
            document.getElementById('down-time').textContent = getTimeOfDay();
        }

        if ((key === 'e1' || key === 'e2') && !timers.e1.running && !timers.e2.running) {
            clearInterval(timers.globalEng.interval);
            timers.globalEng.interval = null;
            timers.globalEng.stopTime = Date.now();
            document.getElementById('eng-last-stop').textContent = getTimeOfDay();
            let total = timers.globalEng.stopTime - timers.globalEng.startTime;
            document.getElementById('eng-run-hms').textContent = formatHMS(total);
            document.getElementById('eng-run-dec').textContent = (total / 3600000).toFixed(1);
        }

        document.getElementById(key + '-start').disabled = false;
        document.getElementById(key + '-stop').disabled = true;
    }

    function resetRow(key) {
        stopTimer(key);
        timers[key].elapsed = 0;
        document.getElementById(key + '-display').textContent = "00:00:00";
        if (key === 'fl') {
            document.getElementById('up-time').textContent = "--:--";
            document.getElementById('down-time').textContent = "--:--";
            document.getElementById('fl-run-hms').textContent = "00:00:00";
            document.getElementById('fl-run-dec').textContent = "0.0";
        }
        if ((key === 'e1' || key === 'e2') && !timers.e1.running && !timers.e2.running) {
            timers.globalEng.startTime = null;
            document.getElementById('eng-first-start').textContent = "--:--";
            document.getElementById('eng-last-stop').textContent = "--:--";
            document.getElementById('eng-run-hms').textContent = "00:00:00";
            document.getElementById('eng-run-dec').textContent = "0.0";
        }
    }

    function masterReset() {
        ['e1', 'e2', 'fl'].forEach(key => resetRow(key));
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw-timer.js'); });
    }
</script>
</body>
</html>
