<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Bell 214 Timer</title>
    <link rel="manifest" href="timer.json">
    <style>
        body { 
            background: #fff; color: #000; font-family: sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 1.8rem; margin: 10px 0 20px 0; border-bottom: 3px solid #000; width: 100%; text-align: center; }
        
        .timer-row {
            width: 95%; max-width: 500px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; padding: 12px; border: 2px solid #000; border-radius: 8px;
        }

        .label { font-size: 1.2rem; font-weight: bold; width: 90px; }
        .controls { display: flex; gap: 8px; }
        
        button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            border-radius: 6px; border: 2px solid #000; cursor: pointer; color: #fff;
        }
        .btn-start { background: #00ff00; color: #000; } /* Bright Green */
        .btn-stop { background: #ff0000; color: #fff; }  /* Bright Red */
        button:disabled { background: #eee; color: #aaa; border-color: #ccc; }

        .time-display {
            font-family: monospace; font-size: 1.6rem; font-weight: bold;
            min-width: 120px; text-align: right;
        }

        .flight-stats {
            width: 95%; max-width: 500px; margin-top: 10px;
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px;
        }
        .stat-box { 
            background: #f0f0f0; padding: 15px; border: 2px solid #000; border-radius: 8px;
            font-weight: bold; font-size: 1.1rem;
        }
        .decimal-large { font-size: 3rem; color: #000; text-align: center; display: block; }
        .reset-wrap { margin-top: 30px; width: 95%; max-width: 500px; }
        .btn-reset { background: #000; color: #fff; width: 100%; padding: 15px; }
    </style>
</head>
<body>

    <h1>Bell 214 Flight Timer</h1>

    <div class="timer-row">
        <div class="label">ENG 1</div>
        <div class="controls">
            <button class="btn-start" id="e1-start" onclick="startTimer('e1')">START</button>
            <button class="btn-stop" id="e1-stop" onclick="stopTimer('e1')" disabled>STOP</button>
        </div>
        <div class="time-display" id="e1-display">00:00:00</div>
    </div>

    <div class="timer-row">
        <div class="label">ENG 2</div>
        <div class="controls">
            <button class="btn-start" id="e2-start" onclick="startTimer('e2')">START</button>
            <button class="btn-stop" id="e2-stop" onclick="stopTimer('e2')" disabled>STOP</button>
        </div>
        <div class="time-display" id="e2-display">00:00:00</div>
    </div>

    <div class="timer-row" style="background: #e6f3ff;">
        <div class="label">FLIGHT</div>
        <div class="controls">
            <button class="btn-start" id="fl-start" onclick="startTimer('fl')">START</button>
            <button class="btn-stop" id="fl-stop" onclick="stopTimer('fl')" disabled>STOP</button>
        </div>
        <div class="time-display" id="fl-display">00:00:00</div>
    </div>

    <div class="flight-stats">
        <div class="stat-box">
            UP: <span id="up-time">--:--</span><br>
            DOWN: <span id="down-time">--:--</span>
        </div>
        <div class="stat-box">
            HOURS (DECIMAL)
            <span class="decimal-large" id="decimal-display">0.0</span>
        </div>
    </div>

    <div class="reset-wrap">
        <button class="btn-reset" onclick="resetAll()">RESET ALL TIMERS</button>
    </div>

<script>
    let timers = {
        e1: { elapsed: 0, start: null, interval: null },
        e2: { elapsed: 0, start: null, interval: null },
        fl: { elapsed: 0, start: null, interval: null }
    };

    function formatTime(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let hrs = Math.floor(totalSecs / 3600);
        let mins = Math.floor((totalSecs % 3600) / 60);
        let secs = totalSecs % 60;
        return [hrs, mins, secs].map(v => v < 10 ? "0" + v : v).join(":");
    }

    function startTimer(key) {
        timers[key].start = Date.now() - timers[key].elapsed;
        
        if (key === 'fl') {
            let now = new Date();
            document.getElementById('up-time').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }

        timers[key].interval = setInterval(() => {
            timers[key].elapsed = Date.now() - timers[key].start;
            document.getElementById(key + '-display').textContent = formatTime(timers[key].elapsed);
            if (key === 'fl') {
                document.getElementById('decimal-display').textContent = (timers[key].elapsed / 3600000).toFixed(1);
            }
        }, 1000);

        document.getElementById(key + '-start').disabled = true;
        document.getElementById(key + '-stop').disabled = false;
    }

    function stopTimer(key) {
        clearInterval(timers[key].interval);
        if (key === 'fl') {
            let now = new Date();
            document.getElementById('down-time').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }
        document.getElementById(key + '-start').disabled = false;
        document.getElementById(key + '-stop').disabled = true;
    }

    function resetAll() {
        if(!confirm("Clear all times?")) return;
        Object.keys(timers).forEach(key => {
            clearInterval(timers[key].interval);
            timers[key] = { elapsed: 0, start: null, interval: null };
            document.getElementById(key + '-display').textContent = "00:00:00";
            document.getElementById(key + '-start').disabled = false;
            document.getElementById(key + '-stop').disabled = true;
        });
        document.getElementById('up-time').textContent = "--:--";
        document.getElementById('down-time').textContent = "--:--";
        document.getElementById('decimal-display').textContent = "0.0";
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw-timer.js');
        });
    }
</script>
</body>
</html>
